version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agloval_postgres
    environment:
      POSTGRES_DB: agloval_db
      POSTGRES_USER: agloval_user
      POSTGRES_PASSWORD: agloval_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: